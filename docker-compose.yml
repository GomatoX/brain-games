services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      # в”Ђв”Ђв”Ђ Core в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
      - AUTH_SECRET=${AUTH_SECRET}
      - AUTH_URL=${AUTH_URL:-http://localhost:3000}
      - DATABASE_PATH=/app/data/brain.db
      - GOOGLE_AI_API_KEY=${GOOGLE_AI_API_KEY:-}
      # в”Ђв”Ђв”Ђ Branding (runtime) в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
      - PLATFORM_MODE=${PLATFORM_MODE:-saas}
      - PLATFORM_NAME=${PLATFORM_NAME:-Rustycogs.io}
      - PLATFORM_ACCENT=${PLATFORM_ACCENT:-#c25e40}
      - PLATFORM_URL=${PLATFORM_URL:-https://rustycogs.io}
      - PLATFORM_LOGO=${PLATFORM_LOGO:-}
      - HIDE_LANDING=${HIDE_LANDING:-false}
      - HIDE_REGISTER=${HIDE_REGISTER:-false}
      - ALLOWED_IPS=${ALLOWED_IPS:-}
      # в”Ђв”Ђв”Ђ Default User в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
      - DEFAULT_USER_EMAIL=${DEFAULT_USER_EMAIL:-}
      - DEFAULT_USER_PASSWORD=${DEFAULT_USER_PASSWORD:-}
    volumes:
      - app_data:/app/data
    restart: unless-stopped

volumes:
  app_data:
