<style>
  /* Page scaffold for the demo */
  body {
    background:
      radial-gradient(circle at 1px 1px, rgba(0,0,0,0.04) 1px, transparent 0) 0 0 / 18px 18px,
      var(--tool-bg);
    min-height: 100vh;
  }
  .page {
    max-width: 1100px;
    margin: 0 auto;
    padding: 32px 28px 60px;
  }
  .page-head {
    display: flex; align-items: center; justify-content: space-between;
    margin-bottom: 12px;
  }
  .page-title h1 {
    margin: 0 0 4px;
    font-size: 24px;
    font-weight: 600;
    letter-spacing: -0.01em;
  }
  .page-title p {
    margin: 0;
    color: var(--tool-text-soft);
    font-size: 13.5px;
  }
  .page-actions { display: flex; gap: 8px; }

  /* Local sub-nav across game types */
  .games-nav {
    display: flex; gap: 2px;
    border-bottom: 1px solid var(--tool-border);
    margin-bottom: 22px;
  }
  .games-nav a {
    padding: 8px 14px;
    font-size: 13px;
    color: var(--tool-text-soft);
    text-decoration: none;
    border-bottom: 2px solid transparent;
    margin-bottom: -1px;
    font-weight: 500;
    display: inline-flex; align-items: center; gap: 7px;
  }
  .games-nav a:hover { color: var(--tool-text); }
  .games-nav a.active { color: var(--tool-text); border-bottom-color: var(--tool-accent); }

  /* Game cards grid (the "underlying page" the modal sits on top of) */
  .games-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
    gap: 14px;
  }
  .gcard {
    background: var(--tool-surface);
    border: 1px solid var(--tool-border);
    border-radius: 10px;
    padding: 16px;
    display: flex; flex-direction: column; gap: 12px;
    transition: border-color 0.12s, transform 0.12s;
  }
  .gcard:hover { border-color: var(--tool-border-strong); }
  .gcard-head {
    display: flex; align-items: flex-start; justify-content: space-between; gap: 8px;
  }
  .gcard-title {
    font-size: 14.5px; font-weight: 600;
    margin: 0 0 4px;
    letter-spacing: -0.005em;
  }
  .gcard-meta { font-size: 12px; color: var(--tool-text-faint); font-family: var(--font-mono); }
  .gcard-glyph {
    width: 36px; height: 36px;
    border-radius: 8px;
    background: var(--tool-surface-2);
    display: grid; place-items: center;
    color: var(--tool-text-soft);
    flex-shrink: 0;
  }
  .gcard-tiles {
    display: flex; gap: 3px;
  }
  .gcard-tile {
    width: 22px; height: 26px;
    border-radius: 3px;
    border: 1px solid var(--tool-border);
    display: grid; place-items: center;
    font-size: 11px; font-weight: 700;
    color: var(--tool-text);
    background: var(--tool-surface);
  }
  .gcard-tile.correct { background: var(--tool-accent); color: white; border-color: transparent; }
  .gcard-tile.present { background: #fdf2ea; color: var(--tool-accent); border-color: transparent; }
  .gcard-foot {
    display: flex; align-items: center; justify-content: space-between;
    padding-top: 10px;
    border-top: 1px solid var(--tool-border);
    font-size: 11.5px;
    color: var(--tool-text-faint);
  }

  /* (Toolbar/table/pagination styles moved to styles.css for reuse across pages) */
</style>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel" src="icons.jsx"></script>

<script type="text/babel">
const { useState, useRef, useEffect } = React;

// ===== Reusable IconSelect component (reused from Components.html) =====
const IconSelect = ({ value, onChange, options, placeholder = 'Choose…' }) => {
  const [open, setOpen] = useState(false);
  const [q, setQ] = useState('');
  const ref = useRef(null);

  useEffect(() => {
    if (!open) return;
    const handler = (e) => { if (!ref.current?.contains(e.target)) setOpen(false); };
    document.addEventListener('mousedown', handler);
    return () => document.removeEventListener('mousedown', handler);
  }, [open]);

  const current = options.find(o => o.id === value);
  const filtered = options.filter(o =>
    o.label.toLowerCase().includes(q.toLowerCase()) ||
    (o.sub || '').toLowerCase().includes(q.toLowerCase())
  );

  return (
    <div className="iselect" ref={ref}>
      <button type="button" className={`iselect-trigger ${open?'open':''}`} onClick={() => setOpen(!open)}>
        {current ? (
          <>
            <span className="iselect-glyph">{current.glyph}</span>
            <span className="iselect-label">{current.label}</span>
            {current.sub && <span className="iselect-sub">{current.sub}</span>}
          </>
        ) : (
          <span className="iselect-label" style={{color:'var(--tool-text-faint)'}}>{placeholder}</span>
        )}
        <svg className="iselect-caret" viewBox="0 0 10 10"><path d="M2 4l3 3 3-3" stroke="currentColor" strokeWidth="1.4" fill="none" strokeLinecap="round" strokeLinejoin="round"/></svg>
      </button>
      {open && (
        <div className="iselect-menu">
          <div className="iselect-search">
            <input autoFocus placeholder="Search…" value={q} onChange={e => setQ(e.target.value)} />
          </div>
          <div className="iselect-list">
            {filtered.length === 0 && <div className="iselect-empty">No matches</div>}
            {filtered.map(o => (
              <button
                key={o.id}
                type="button"
                className={`iselect-option ${value===o.id?'active':''}`}
                onClick={() => { onChange(o.id); setOpen(false); setQ(''); }}
              >
                <span className="iselect-glyph">{o.glyph}</span>
                <span className="iselect-label">{o.label}</span>
                {o.sub && <span className="iselect-sub">{o.sub}</span>}
                <svg className="iselect-check" viewBox="0 0 14 14"><path d="M2 7l3 3 7-7" stroke="currentColor" strokeWidth="2" fill="none" strokeLinecap="round" strokeLinejoin="round"/></svg>
              </button>
            ))}
          </div>
        </div>
      )}
    </div>
  );
};

// ===== Status options =====
const STATUS_OPTIONS = [
  { id: 'draft',     label: 'Draft',     sub: 'private',   glyph: <span style={{width:8,height:8,borderRadius:'50%',background:'#b45309'}}/> },
  { id: 'scheduled', label: 'Scheduled', sub: 'auto-publish', glyph: <span style={{width:8,height:8,borderRadius:'50%',background:'#1d4ed8'}}/> },
  { id: 'published', label: 'Published', sub: 'live',      glyph: <span style={{width:8,height:8,borderRadius:'50%',background:'#15803d'}}/> },
];
const PRESET_OPTIONS = [
  { id: 'none',     label: 'Default',  sub: 'no branding', glyph: <span style={{display:'flex',gap:1}}><span style={{width:5,height:14,background:'#9ca3af'}}/><span style={{width:5,height:14,background:'#e5e7eb'}}/></span> },
  { id: 'rust',     label: 'Rust',     sub: 'workspace',   glyph: <span style={{display:'flex',gap:1}}><span style={{width:5,height:14,background:'#c2410c'}}/><span style={{width:5,height:14,background:'#fffaf5'}}/></span> },
  { id: 'forest',   label: 'Forest',   sub: 'nature.co',   glyph: <span style={{display:'flex',gap:1}}><span style={{width:5,height:14,background:'#15803d'}}/><span style={{width:5,height:14,background:'#f6faf6'}}/></span> },
  { id: 'cobalt',   label: 'Cobalt',   sub: 'enterprise',  glyph: <span style={{display:'flex',gap:1}}><span style={{width:5,height:14,background:'#1d4ed8'}}/><span style={{width:5,height:14,background:'#f6f8ff'}}/></span> },
  { id: 'plum',     label: 'Plum',     sub: 'arts',        glyph: <span style={{display:'flex',gap:1}}><span style={{width:5,height:14,background:'#7e22ce'}}/><span style={{width:5,height:14,background:'#faf6ff'}}/></span> },
];
const LANG_OPTIONS = [
  { id: 'en', label: 'English',   sub: 'en-US', glyph: '🇺🇸' },
  { id: 'es', label: 'Español',   sub: 'es-ES', glyph: '🇪🇸' },
  { id: 'fr', label: 'Français',  sub: 'fr-FR', glyph: '🇫🇷' },
  { id: 'de', label: 'Deutsch',   sub: 'de-DE', glyph: '🇩🇪' },
];

// ===== Number stepper =====
const NumberInput = ({ value, onChange, min = 1, max = 12 }) => (
  <div className="input-num">
    <button type="button" onClick={() => onChange(Math.max(min, value - 1))}>−</button>
    <input value={value} onChange={e => onChange(Math.min(max, Math.max(min, +e.target.value || min)))} />
    <button type="button" onClick={() => onChange(Math.min(max, value + 1))}>+</button>
  </div>
);

// ===== Modal =====
const CreateWordGameModal = ({ onClose, onCreate }) => {
  const [tab, setTab] = useState('content');
  const [form, setForm] = useState({
    title: '',
    status: 'draft',
    preset: 'rust',
    word: '',
    hint: '',
    maxAttempts: 6,
    language: 'en',
  });
  const set = (k, v) => setForm(f => ({ ...f, [k]: v }));

  const word = (form.word || '').toUpperCase().slice(0, 5);
  const tiles = Array.from({ length: 5 }, (_, i) => word[i] || '');
  const canCreate = form.title.trim() && form.word.trim().length >= 3;

  const submit = () => {
    if (!canCreate) return;
    onCreate(form);
    onClose();
  };

  return (
    <div className="modal-backdrop" onClick={onClose}>
      <div className="modal modal-wide" onClick={e => e.stopPropagation()}>

        <div className="modal-head" style={{display:'flex', alignItems:'flex-start', justifyContent:'space-between', paddingBottom: 14}}>
          <div>
            <h3 className="modal-title">Create Word Game</h3>
            <p className="modal-sub">Define the puzzle players will solve.</p>
          </div>
          <button className="modal-close" onClick={onClose} aria-label="Close">
            <svg width="14" height="14" viewBox="0 0 14 14"><path d="M3 3l8 8M11 3l-8 8" stroke="currentColor" strokeWidth="1.6" strokeLinecap="round"/></svg>
          </button>
        </div>

        <div className="modal-tabs">
          <button className={`modal-tab ${tab==='content'?'active':''}`} onClick={() => setTab('content')}>
            <span className="step-num">1</span>Content
          </button>
          <button className={`modal-tab ${tab==='settings'?'active':''}`} onClick={() => setTab('settings')}>
            <span className="step-num">2</span>Settings
          </button>
        </div>

        {tab === 'content' && (
          <div className="modal-body-grid">
            <div className="preview-tile">
              <span className="preview-tile-label">Live preview · 5-letter word</span>
              <div className="preview-tile-tiles">
                {tiles.map((c, i) => (
                  <div key={i} className={`preview-tile-tile ${!c ? 'empty' : ''}`}>{c}</div>
                ))}
              </div>
            </div>

            <div>
              <label className="field-label-block">Title</label>
              <input
                className="input"
                placeholder="e.g. Monday Mini"
                value={form.title}
                onChange={e => set('title', e.target.value)}
              />
            </div>

            <div>
              <label className="field-label-block">
                Word <span className="opt">3–5 letters</span>
              </label>
              <input
                className="input input-mono"
                placeholder="HELLO"
                maxLength={5}
                value={form.word}
                onChange={e => set('word', e.target.value.replace(/[^A-Za-z]/g, ''))}
              />
              <div className="field-help">Players will guess this word. Stored hashed — never visible to clients.</div>
            </div>

            <div>
              <label className="field-label-block">
                Definition / Hint <span className="opt">optional</span>
                {form.word.trim().length >= 3 && (
                  <button
                    type="button"
                    onClick={() => {
                      const hints = {
                        BRAND: 'Identifying mark of a maker',
                        HELLO: 'A common greeting',
                        THEME: 'Recurring subject or idea',
                        BRAIN: 'Organ of thought',
                        CLEAR: 'Easy to perceive',
                        SHINE: 'To emit light',
                        QUICK: 'Moving fast',
                      };
                      const w = form.word.trim().toUpperCase();
                      set('hint', hints[w] || `A ${w.length}-letter word starting with "${w[0]}".`);
                    }}
                    style={{
                      marginLeft:'auto',
                      padding:'2px 8px',
                      fontSize:11,
                      fontWeight:500,
                      border:'none',
                      borderRadius:4,
                      background:'var(--tool-accent-soft)',
                      color:'var(--tool-accent)',
                      cursor:'pointer',
                      display:'inline-flex',
                      alignItems:'center',
                      gap:4,
                    }}
                    title="Generate a hint from the word"
                  >
                    <svg width="10" height="10" viewBox="0 0 14 14"><path d="M7 1.5l1.4 3.1 3.1 1.4-3.1 1.4L7 10.5 5.6 7.4 2.5 6l3.1-1.4L7 1.5z" fill="currentColor"/></svg>
                    AI suggest
                  </button>
                )}
              </label>
              <textarea
                className="textarea"
                placeholder="A common greeting"
                value={form.hint}
                onChange={e => set('hint', e.target.value)}
              />
            </div>
          </div>
        )}

        {tab === 'settings' && (
          <div className="modal-body-grid">
            <div className="grid-2">
              <div>
                <label className="field-label-block">Status</label>
                <IconSelect value={form.status} onChange={v => set('status', v)} options={STATUS_OPTIONS} />
              </div>
              <div>
                <label className="field-label-block">Language</label>
                <IconSelect value={form.language} onChange={v => set('language', v)} options={LANG_OPTIONS} />
              </div>
            </div>

            <div>
              <label className="field-label-block">
                Branding preset <span className="opt">optional</span>
              </label>
              <IconSelect value={form.preset} onChange={v => set('preset', v)} options={PRESET_OPTIONS} />
              <div className="field-help">Inherits colors, type, and shape tokens from the chosen preset.</div>
            </div>

            <div>
              <label className="field-label-block">Max attempts</label>
              <NumberInput value={form.maxAttempts} onChange={v => set('maxAttempts', v)} min={3} max={10} />
              <div className="field-help">Wordle uses 6. Lower = harder.</div>
            </div>
          </div>
        )}

        <div className="modal-foot">
          {tab === 'content' ? (
            <>
              <button className="btn btn-ghost" onClick={onClose}>Cancel</button>
              <button className="btn" onClick={() => setTab('settings')}>Next: Settings</button>
            </>
          ) : (
            <>
              <button className="btn btn-ghost" onClick={() => setTab('content')}>Back</button>
              <button className="btn" onClick={onClose}>Cancel</button>
              <button className="btn btn-primary" onClick={submit} disabled={!canCreate} style={!canCreate?{opacity:0.45, cursor:'not-allowed'}:{}}>Create game</button>
            </>
          )}
        </div>
      </div>
    </div>
  );
};

// ===== Generate sample games =====
const WORDS = ['BRAND','THEME','TILES','PIXEL','LEVEL','POINT','SOLVE','GAMES','PUZZLE','SMART','QUICK','CRISP','DAILY','MIGHT','PROUD','CRAFT','VIVID','SHINE','ALPHA','BLEND','CLEAR','DRAFT','EAGER','FOCUS','GRAND','HEART','IDEAL','JOLLY','KNACK','LIGHT'];
const TITLES = ['Mini','Daily','Weekly','Mega','Quick','Promo','Vocab','Teaser','Challenge','Express'];
const DAYS = ['Mon','Tue','Wed','Thu','Fri','Sat','Sun'];
const PRESETS = ['rust','forest','cobalt','plum','none'];
const STATUSES = ['published','published','published','draft','scheduled'];
const SAMPLE_GAMES = Array.from({length: 87}, (_, i) => {
  const word = WORDS[i % WORDS.length];
  const status = STATUSES[i % STATUSES.length];
  return {
    id: i + 1,
    title: `${DAYS[i % 7]} · ${TITLES[i % TITLES.length]}`,
    word,
    status,
    preset: PRESETS[i % PRESETS.length],
    plays: status === 'published' ? Math.floor(500 + Math.random() * 9500) : 0,
    completion: status === 'published' ? Math.floor(40 + Math.random() * 55) : 0,
    updated: `${Math.floor(Math.random()*30)+1}d ago`,
    tiles: word.split('').slice(0,5).map((l, k) => ({
      l,
      s: status === 'published' ? (['correct','present','absent','correct','present'][k % 5]) : '',
    })),
  };
});

const StatusPill = ({ s }) => {
  const map = {
    published: { bg: '#ecfdf5', fg: '#15803d', dot: '#15803d', label: 'Published' },
    draft:     { bg: '#fef3c7', fg: '#b45309', dot: '#b45309', label: 'Draft' },
    scheduled: { bg: '#dbeafe', fg: '#1d4ed8', dot: '#1d4ed8', label: 'Scheduled' },
  };
  const m = map[s];
  return (
    <span style={{display:'inline-flex',alignItems:'center',gap:5,padding:'2px 8px',borderRadius:999,fontSize:11,fontWeight:500,background:m.bg,color:m.fg}}>
      <span style={{width:6,height:6,borderRadius:'50%',background:m.dot}}/>{m.label}
    </span>
  );
};

const GamesList = ({ onNew }) => {
  const [q, setQ] = useState('');
  const [filter, setFilter] = useState('all');
  const [page, setPage] = useState(1);
  const PAGE_SIZE = 12;

  const counts = {
    all: SAMPLE_GAMES.length,
    published: SAMPLE_GAMES.filter(g => g.status === 'published').length,
    draft: SAMPLE_GAMES.filter(g => g.status === 'draft').length,
    scheduled: SAMPLE_GAMES.filter(g => g.status === 'scheduled').length,
  };

  const filtered = SAMPLE_GAMES.filter(g => {
    if (filter !== 'all' && g.status !== filter) return false;
    if (q && !g.title.toLowerCase().includes(q.toLowerCase()) && !g.word.toLowerCase().includes(q.toLowerCase())) return false;
    return true;
  });
  const totalPages = Math.max(1, Math.ceil(filtered.length / PAGE_SIZE));
  const curPage = Math.min(page, totalPages);
  const start = (curPage - 1) * PAGE_SIZE;
  const slice = filtered.slice(start, start + PAGE_SIZE);

  React.useEffect(() => { setPage(1); }, [q, filter]);

  return (
    <>
      <div className="list-toolbar">
        <div className="list-search">
          <input placeholder="Search by title or word…" value={q} onChange={e => setQ(e.target.value)}/>
        </div>
        {[
          { id: 'all',       label: 'All' },
          { id: 'published', label: 'Published' },
          { id: 'scheduled', label: 'Scheduled' },
          { id: 'draft',     label: 'Draft' },
        ].map(f => (
          <button key={f.id} className={`filter-chip ${filter===f.id?'active':''}`} onClick={() => setFilter(f.id)}>
            {f.label}<span className="count">{counts[f.id]}</span>
          </button>
        ))}
        <div style={{flex:1}}></div>
        <button className="btn"><Icon name="upload" size={14}/> Export</button>
      </div>

      <table className="tbl gtbl">
        <thead>
          <tr>
            <th style={{width:'30%'}}>Game</th>
            <th style={{width:'14%'}}>Word</th>
            <th style={{width:'14%'}}>Status</th>
            <th style={{width:'14%'}}>Plays</th>
            <th style={{width:'14%'}}>Updated</th>
            <th style={{width:'14%', textAlign:'right'}}>Actions</th>
          </tr>
        </thead>
        <tbody>
          {slice.map(g => (
            <tr key={g.id}>
              <td>
                <div className="gtbl-title-cell">
                  <div className="gtbl-glyph"><Icon name="wordgame" size={14}/></div>
                  <div style={{minWidth:0}}>
                    <div className="gtbl-title">{g.title}</div>
                    <div className="gtbl-sub">{g.preset} · {g.word.length} letters</div>
                  </div>
                </div>
              </td>
              <td>
                <div className="gtbl-tiles">
                  {g.tiles.map((t, k) => <div key={k} className={`t ${t.s}`}>{t.l}</div>)}
                </div>
              </td>
              <td><StatusPill s={g.status}/></td>
              <td className="mono">{g.status === 'published' ? g.plays.toLocaleString() : '—'}</td>
              <td className="mono" style={{color:'var(--tool-text-faint)'}}>{g.updated}</td>
              <td style={{textAlign:'right'}}>
                <div className="row-actions" style={{justifyContent:'flex-end'}}>
                  <button className="tool-icon-btn" title="Preview"><Icon name="eye" size={14}/></button>
                  <button className="tool-icon-btn" title="Edit"><Icon name="settings" size={14}/></button>
                </div>
              </td>
            </tr>
          ))}
          {slice.length === 0 && (
            <tr><td colSpan={6} style={{textAlign:'center', padding:'40px 16px', color:'var(--tool-text-faint)'}}>No games match your filters.</td></tr>
          )}
        </tbody>
      </table>

      <div className="pagination">
        <span>Showing <strong style={{color:'var(--tool-text)'}}>{start + 1}–{Math.min(start + PAGE_SIZE, filtered.length)}</strong> of {filtered.length}</span>
        <div className="pagination-controls">
          <button className="page-btn" disabled={curPage === 1} onClick={() => setPage(curPage - 1)}>‹</button>
          {Array.from({length: totalPages}, (_, i) => i + 1).slice(0, 5).map(n => (
            <button key={n} className={`page-btn ${curPage === n ? 'active' : ''}`} onClick={() => setPage(n)}>{n}</button>
          ))}
          {totalPages > 5 && <span style={{padding:'0 4px',color:'var(--tool-text-faint)'}}>…</span>}
          {totalPages > 5 && <button className={`page-btn ${curPage === totalPages ? 'active' : ''}`} onClick={() => setPage(totalPages)}>{totalPages}</button>}
          <button className="page-btn" disabled={curPage === totalPages} onClick={() => setPage(curPage + 1)}>›</button>
        </div>
      </div>
    </>
  );
};

const App = () => {
  const [open, setOpen] = useState(false);
  useEffect(() => {
    const handler = () => setOpen(true);
    document.getElementById('open-modal').addEventListener('click', handler);
    return () => document.getElementById('open-modal').removeEventListener('click', handler);
  }, []);

  return (
    <>
      <GamesList onNew={() => setOpen(true)}/>
      {open && <CreateWordGameModal onClose={() => setOpen(false)} onCreate={(f) => console.log('created', f)} />}
    </>
  );
};

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
