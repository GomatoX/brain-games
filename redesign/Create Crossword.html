  .cw-meta {

  .cw-meta-label {
    font-size: 10px;
    font-family: var(--font-mono);
    letter-spacing: 0.08em;

    margin-bottom: 4px;

    background: none; border: none;
    padding: 4px 0;

    font-weight: 500;
    cursor: pointer;
    text-align: left;

  .cw-settings-toggle:hover { color: var(--tool-accent); }
  .cw-settings-summary {
    margin-left: auto;
    font-size: 11.5px;
    font-family: var(--font-mono);
    color: var(--tool-text-faint);

  .cw-settings-body {

  /* Star (featured) toggle in word rows */
  .words-row.starred {

  .words-row.starred .words-row-word {

  .words-row-btn-star-active {

  }
  .words-row-btn-star-active:hover {

  /* Mini puzzle for table row */
  .cw-mini {
    display: grid;
    grid-template-columns: repeat(5, 5px);
    gap: 1px;
    background: var(--tool-border);
    padding: 1px;
    border-radius: 1px;

  .cw-mini .c { width: 5px; height: 5px; background: var(--tool-surface); }
  .cw-mini .c.b { background: var(--tool-text-faint); }
  .cw-mini .c.hl { background: var(--tool-accent); }

  /* Mini puzzle for table row */
  .cw-mini {
    display: grid;
    grid-template-columns: repeat(5, 5px);
    gap: 1px;
    background: var(--tool-border);
    padding: 1px;
    border-radius: 1px;
  }
  .cw-mini .c { width: 5px; height: 5px; background: var(--tool-surface); }
  .cw-mini .c.b { background: var(--tool-text-faint); }
  .cw-mini .c.hl { background: var(--tool-accent); }

<script type="text/babel">
const { useState, useEffect, useMemo } = React;

// Build a small symmetric crossword preview that highlights the main word
const buildCrosswordPreview = (mainWord) => {
  // 7×7 grid, 'b' = blocked, '' = open, 'main' = part of the main hidden word
  const SIZE = 7;
  const layout = [
    ['b','',  '', 'b','',  '', 'b'],
    ['',  '', '', '',  '', '', ''],
    ['',  '', '', '',  '', '', 'b'],
    ['b','',  '', '',  '', '', ''],
    ['',  '', 'b','',  '', '', ''],
    ['',  '', '', '',  '', '', ''],
    ['b','',  '', 'b','',  '', 'b'],
  ];
  const cells = [];
  let n = 1;
  const numbered = new Set();
  for (let r = 0; r < SIZE; r++) {
    for (let c = 0; c < SIZE; c++) {
      const isB = layout[r][c] === 'b';
      const startsAcross = !isB && (c === 0 || layout[r][c-1] === 'b') && c < SIZE-1 && layout[r][c+1] !== 'b';
      const startsDown = !isB && (r === 0 || layout[r-1][c] === 'b') && r < SIZE-1 && layout[r+1][c] !== 'b';
      const num = (startsAcross || startsDown) ? n++ : null;
      // mark a diagonal-ish trace as the "main word"
      const mainCells = [[1,3],[2,3],[3,3],[4,3]]; // vertical column
      const isMain = mainCells.some(([rr,cc]) => rr===r && cc===c);
      cells.push({ r, c, b: isB, num, main: isMain });
    }
  }
  // place letters of mainWord in the main column
  if (mainWord) {
    const letters = mainWord.toUpperCase().slice(0, 4).split('');
    cells.filter(c => c.main).forEach((c, i) => { c.letter = letters[i] || ''; });
  }
  return cells;
};

// ===== Create Crossword modal =====
// Tabbed: 1) Words & clues   2) Settings — consistent with Word Game / Word Search.
const CreateCrosswordModal = ({ onClose, onCreate }) => {
  const [tab, setTab] = useState('content');
  const [form, setForm] = useState({
    title: '',
    topic: '',
    status: 'draft',
    difficulty: 'easy',
    preset: 'rust',
    entries: [],
    featured: -1,
    gridSize: 13,
  });
  const set = (k, v) => setForm(f => ({ ...f, [k]: v }));

  const featuredWord = form.featured >= 0 ? form.entries[form.featured]?.word : '';
  const cells = useMemo(() => buildCrosswordPreview(featuredWord), [featuredWord]);
  const canCreate = form.title.trim() && form.entries.length >= 2;

  return (
    <div className="modal-backdrop" onClick={onClose}>
      <div className="modal modal-wide" onClick={e => e.stopPropagation()}>
        <div className="modal-head">
          <div>
            <h3 className="modal-title">Create Crossword</h3>
            <p className="modal-sub">Start with a topic and let Cluemaster suggest words and clues — refine each one inline.</p>
          </div>
          <button className="modal-close" onClick={onClose} aria-label="Close">
            <svg width="14" height="14" viewBox="0 0 14 14"><path d="M3 3l8 8M11 3l-8 8" stroke="currentColor" strokeWidth="1.6" strokeLinecap="round"/></svg>
          </button>
        </div>

        <div className="modal-tabs">
          <button className={`modal-tab ${tab==='content'?'active':''}`} onClick={() => setTab('content')}>
            <span className="step-num">1</span>Words & clues
          </button>
          <button className={`modal-tab ${tab==='ai'?'active':''}`} onClick={() => setTab('ai')}>
            <span className="step-num">
              <svg width="9" height="9" viewBox="0 0 14 14"><path d="M7 1.5l1.4 3.1 3.1 1.4-3.1 1.4L7 10.5 5.6 7.4 2.5 6l3.1-1.4L7 1.5z" fill="currentColor"/></svg>
            </span>AI generate
          </button>
          <button className={`modal-tab ${tab==='settings'?'active':''}`} onClick={() => setTab('settings')}>
            <span className="step-num">2</span>Settings
          </button>
        </div>

        {tab === 'content' && (
          <div className="modal-body-grid">
            <div className="grid-2">
              <div>
                <label className="field-label-block">Puzzle title</label>
                <input className="input" placeholder="e.g. Friday Cryptic" value={form.title} onChange={e => set('title', e.target.value)}/>
              </div>
              <div>
                <label className="field-label-block">
                  Topic <span className="opt">guides AI suggestions</span>
                </label>
                <input className="input" placeholder="e.g. Space exploration, Ancient Rome…" value={form.topic} onChange={e => set('topic', e.target.value)}/>
              </div>
            </div>

            <div className="cw-edit-grid">
              <div className="cw-edit-words">
                <label className="field-label-block">
                  Words & clues
                  <span className="opt" style={{marginLeft:'auto', color: form.entries.length >= 2 ? 'var(--tool-good)' : 'var(--tool-text-faint)'}}>
                    {form.entries.length === 0 ? 'add at least 2' : `${form.entries.length} ${form.entries.length === 1 ? 'entry' : 'entries'} · ${form.entries.length >= 2 ? 'ready' : `${2 - form.entries.length} more`}`}
                  </span>
                </label>
                <div style={{display:'flex',flexDirection:'column',gap:10}}>
                  <WordHintInput
                    hintPlaceholder="Clue (optional)"
                    onAdd={(it) => set('entries', [...form.entries, it])}
                  />
                  {form.entries.length > 0 ? (
                    <div className="words-list" data-count={form.entries.length}>
                      {form.entries.map((it, i) => (
                        <CrosswordEntryRow
                          key={i}
                          index={i}
                          item={it}
                          starred={form.featured === i}
                          onToggleStar={() => set('featured', form.featured === i ? -1 : i)}
                          onUpdate={(patch) => set('entries', form.entries.map((w, k) => k === i ? { ...w, ...patch } : w))}
                          onRemove={() => {
                            const next = form.entries.filter((_, k) => k !== i);
                            setForm(f => ({
                              ...f,
                              entries: next,
                              featured: f.featured === i ? -1 : (f.featured > i ? f.featured - 1 : f.featured),
                            }));
                          }}
                        />
                      ))}
                    </div>
                  ) : (
                    <div className="words-empty">
                      <svg width="22" height="22" viewBox="0 0 22 22" style={{opacity:0.4}}>
                        <rect x="2" y="6" width="18" height="3" rx="1" stroke="currentColor" strokeWidth="1.4" fill="none"/>
                        <rect x="2" y="13" width="18" height="3" rx="1" stroke="currentColor" strokeWidth="1.4" fill="none"/>
                      </svg>
                      <span>No words yet — type one above, or use the <strong>AI generate</strong> tab.</span>
                    </div>
                  )}
                </div>
              </div>

              <div className="cw-edit-preview">
                <div className="cw-preview">
                  <div className="cw-grid">
                    {cells.map((c, i) => (
                      <div key={i} className={`c ${c.b ? 'b' : ''} ${c.main ? 'main' : ''}`}>
                        {c.num && <span className="num">{c.num}</span>}
                        {c.letter || ''}
                      </div>
                    ))}
                  </div>
                  <div className="cw-meta">
                    <div className="cw-meta-label">Live preview</div>
                    <div className="cw-meta-row">
                      <span>Entries</span>
                      <strong>{form.entries.length}</strong>
                    </div>
                    <div className="cw-meta-row">
                      <span>Featured</span>
                      <strong style={{color: featuredWord ? 'var(--tool-accent)' : 'var(--tool-text-faint)'}}>
                        {featuredWord || '—'}
                      </strong>
                    </div>
                    <div className="cw-meta-row">
                      <span>Grid</span>
                      <strong>{form.gridSize}×{form.gridSize}</strong>
                    </div>
                  </div>
                </div>
              </div>
            </div>
          </div>
        )}

        {tab === 'ai' && (
          <div className="modal-body-grid">
            <AIGenerateTab
              context={form.topic || form.title}
              existingWords={form.entries}
              onAccept={(items) => set('entries', [...form.entries, ...items])}
              defaultLang="lt"
              kind="entries"
            />
          </div>
        )}

        {tab === 'settings' && (
          <div className="modal-body-grid">
            <div className="grid-2">
              <div>
                <label className="field-label-block">Status</label>
                <IconSelect value={form.status} onChange={v => set('status', v)} options={STATUS_OPTIONS} />
              </div>
              <div>
                <label className="field-label-block">Difficulty</label>
                <IconSelect value={form.difficulty} onChange={v => set('difficulty', v)} options={DIFFICULTY_OPTIONS} />
              </div>
            </div>
            <div>
              <label className="field-label-block">
                Branding preset <span className="opt">optional</span>
              </label>
              <IconSelect value={form.preset} onChange={v => set('preset', v)} options={PRESET_OPTIONS} />
              <div className="field-help">Inherits colors, type, and shape tokens.</div>
            </div>
            <div>
              <label className="field-label-block">Grid size</label>
              <div style={{display:'flex',gap:6}}>
                {[9, 11, 13, 15].map(n => (
                  <button
                    key={n}
                    type="button"
                    onClick={() => set('gridSize', n)}
                    className={`filter-chip ${form.gridSize === n ? 'active' : ''}`}
                  >{n}×{n}</button>
                ))}
              </div>
              <div className="field-help">The solver auto-fits your words into a symmetric grid of this size.</div>
            </div>
          </div>
        )}

        <div className="modal-foot">
          {tab === 'content' && (
            <>
              <button className="btn btn-ghost" onClick={onClose}>Cancel</button>
              <button className="btn" onClick={() => setTab('settings')}>Next: Settings</button>
            </>
          )}
          {tab === 'ai' && (
            <>
              <button className="btn btn-ghost" onClick={() => setTab('content')}>Back to words</button>
              <button className="btn" onClick={() => setTab('settings')}>Next: Settings</button>
            </>
          )}
          {tab === 'settings' && (
            <>
              <button className="btn btn-ghost" onClick={() => setTab('content')}>Back</button>
              <button className="btn" onClick={onClose}>Cancel</button>
              <button
                className="btn btn-primary"
                onClick={() => { if (canCreate) { onCreate(form); onClose(); } }}
                disabled={!canCreate}
                style={!canCreate?{opacity:0.45,cursor:'not-allowed'}:{}}
              >Create puzzle</button>
            </>
          )}
        </div>
      </div>
    </div>
  );
};

// Custom entry row with star toggle (extends WordChipRow logic)
const CrosswordEntryRow = ({ index, item, starred, onToggleStar, onUpdate, onRemove }) => {
  const [editing, setEditing] = useState(false);
  const [word, setWord] = useState(item.word);
  const [hint, setHint] = useState(item.hint || '');

  useEffect(() => { setWord(item.word); setHint(item.hint || ''); }, [item, editing]);

  const commit = () => {
    const w = (word || '').trim().toUpperCase();
    if (w.length < 2) return;
    onUpdate({ word: w, hint: hint.trim(), ai: false });
    setEditing(false);
  };

  if (editing) {
    return (
      <div className="words-row editing">
        <span className="words-row-num">{index + 1}</span>
        <input
          autoFocus
          className="words-row-word-input"
          value={word}
          onChange={e => setWord(e.target.value.replace(/[^A-Za-z]/g, '').toUpperCase())}
          onKeyDown={e => { if (e.key === 'Enter') commit(); if (e.key === 'Escape') setEditing(false); }}
          maxLength={14}
        />
        <input
          className="words-row-hint-input"
          placeholder="Clue (optional)"
          value={hint}
          onChange={e => setHint(e.target.value)}
          onKeyDown={e => { if (e.key === 'Enter') commit(); if (e.key === 'Escape') setEditing(false); }}
        />
        <button type="button" className="words-row-btn words-row-btn-primary" onClick={commit} title="Save (Enter)">
          <svg width="12" height="12" viewBox="0 0 14 14"><path d="M2 7l3 3 7-7" stroke="currentColor" strokeWidth="2" fill="none" strokeLinecap="round" strokeLinejoin="round"/></svg>
        </button>
        <button type="button" className="words-row-btn" onClick={() => setEditing(false)} title="Cancel (Esc)">
          <svg width="11" height="11" viewBox="0 0 11 11"><path d="M2 2l7 7M9 2l-7 7" stroke="currentColor" strokeWidth="1.6" strokeLinecap="round"/></svg>
        </button>
      </div>
    );
  }

  return (
    <div className={`words-row ${starred ? 'starred' : ''}`} onDoubleClick={() => setEditing(true)}>
      <span className="words-row-num">{index + 1}</span>
      <span className="words-row-word">
        {item.word}
        {item.ai && <span className="words-row-ai" title="Generated by AI">AI</span>}
      </span>
      <span className={`words-row-hint ${!item.hint ? 'empty' : ''}`} onClick={() => setEditing(true)}>
        {item.hint || 'Click to add clue…'}
      </span>
      <button
        type="button"
        className={`words-row-btn ${starred ? 'words-row-btn-star-active' : ''}`}
        onClick={onToggleStar}
        title={starred ? 'Featured word' : 'Mark as featured (highlights in grid)'}
      >
        <svg width="11" height="11" viewBox="0 0 14 14">
          <path d="M7 1.5l1.6 3.5 3.9.4-2.9 2.6.9 3.8L7 9.7l-3.5 2.1.9-3.8L1.5 5.4l3.9-.4L7 1.5z"
            stroke="currentColor" strokeWidth="1.2" fill={starred ? 'currentColor' : 'none'} strokeLinejoin="round"/>
        </svg>
      </button>
      <button type="button" className="words-row-btn" onClick={() => setEditing(true)} title="Edit">
        <svg width="11" height="11" viewBox="0 0 14 14"><path d="M9.5 2.5l2 2L5 11H3v-2l6.5-6.5z" stroke="currentColor" strokeWidth="1.4" fill="none" strokeLinejoin="round"/></svg>
      </button>
      <button type="button" className="words-row-btn words-row-btn-danger" onClick={onRemove} title="Remove">
        <svg width="11" height="11" viewBox="0 0 11 11"><path d="M2 2l7 7M9 2l-7 7" stroke="currentColor" strokeWidth="1.6" strokeLinecap="round"/></svg>
      </button>
    </div>
  );
};

// ===== Sample data =====
const THEMES = ['Classic','Cryptic','Themed','Mini','Sunday','Quick','Music','Movies','Sports','History','Science','Travel'];
const DIFFICULTIES = ['easy','easy','medium','medium','hard'];
const PRESETS = ['rust','forest','cobalt','plum','none'];
const STATUSES = ['published','published','published','draft','scheduled'];

const SAMPLE_CW = Array.from({length: 34}, (_, i) => {
  const status = STATUSES[i % STATUSES.length];
  const difficulty = DIFFICULTIES[i % DIFFICULTIES.length];
  const gridSize = difficulty === 'easy' ? 9 : difficulty === 'medium' ? 13 : 15;
  return {
    id: i + 1,
    title: `${THEMES[i % THEMES.length]} ${i < 12 ? '#' + (i+1) : i < 24 ? 'Vol. ' + ((i%6)+1) : 'Edition'}`,
    searchKey: THEMES[i % THEMES.length],
    status,
    difficulty,
    preset: PRESETS[i % PRESETS.length],
    entries: difficulty === 'easy' ? 14 + (i%3) : difficulty === 'medium' ? 26 + (i%4) : 38 + (i%5),
    gridSize,
    plays: status === 'published' ? Math.floor(200 + Math.random() * 4500) : 0,
    updated: `${Math.floor(Math.random()*30)+1}d ago`,
  };
});

// Mini crossword icon for the row
const CW_PATTERN = [
  '.X.X.',
  'XXXXX',
  '.X.X.',
  'XXXXX',
  '.X.X.',
];
const MiniCw = () => (
  <div className="cw-mini">
    {CW_PATTERN.flatMap((row, r) => row.split('').map((ch, c) => (
      <div key={`${r}-${c}`} className={`c ${ch === '.' ? 'b' : ''} ${(r === 1 && c === 2) || (r === 3 && c === 2) ? 'hl' : ''}`}/>
    )))}
  </div>
);

const COLUMNS = [
  { header: 'Puzzle', width: '32%', render: (g) => <TitleCell title={g.title} sub={`${g.preset} · ${g.gridSize}×${g.gridSize} grid`} iconName="crossword" /> },
  { header: 'Entries', width: '13%', render: (g) => (
      <div style={{display:'flex',alignItems:'center',gap:8}}>
        <MiniCw/>
        <span className="mono">{g.entries}</span>
      </div>
    ) },
  { header: 'Difficulty', width: '14%', render: (g) => <DifficultyDots d={g.difficulty}/> },
  { header: 'Status', width: '13%', render: (g) => <StatusPill s={g.status}/> },
  { header: 'Plays', width: '10%', render: (g) => <span className="mono">{g.status === 'published' ? g.plays.toLocaleString() : '—'}</span> },
  { header: 'Updated', width: '10%', render: (g) => <span className="mono" style={{color:'var(--tool-text-faint)'}}>{g.updated}</span> },
  { header: 'Actions', width: '8%', align: 'right', render: () => <RowActions /> },
];

const App = () => {
  const [open, setOpen] = useState(false);
  useEffect(() => {
    const handler = () => setOpen(true);
    document.getElementById('open-modal').addEventListener('click', handler);
    return () => document.getElementById('open-modal').removeEventListener('click', handler);
  }, []);

  return (
    <>
      <GamesList games={SAMPLE_CW} iconName="crossword" columns={COLUMNS} onNew={() => setOpen(true)} />
      {open && <CreateCrosswordModal onClose={() => setOpen(false)} onCreate={(f) => console.log('created crossword', f)} />}
    </>
  );
};

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
